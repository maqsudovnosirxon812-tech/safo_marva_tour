# Spring Datasource Configurations
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:root1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Render: bazaga ulanmasa uzoq kutib qolmasin
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# Server Port (Matching our landing page expectations)
server.port=${PORT:3000}

# Telegram Bot — faqat Render Environment dan (GitHubda token saqlanmasin!)
bot.token=${BOT_TOKEN}
bot.username=${BOT_USERNAME:safomarva_admin_bot}
bot.leadToken=${LEAD_BOT_TOKEN}
bot.admins=${TELEGRAM_ADMINS}

# Admin REST API — Render da ADMIN_API_KEY qo'ying
admin.api-key=${ADMIN_API_KEY}

# Enable Static Content Serving (landing page html and galereya)
spring.web.resources.static-locations=classpath:/static/,file:./
