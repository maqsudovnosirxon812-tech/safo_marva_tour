        n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;

    function trackMetaEvent(eventName, params) {
        if (typeof fbq === 'function') fbq('track', eventName, params || {});
    }

    // Simple Intersection Observer for reveal animations
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // Galereya: faqat ko'rinish zonasiga kirganda yuklash
    const gallerySection = document.getElementById('gallery');
    if (gallerySection && 'IntersectionObserver' in window) {
        const galleryObserver = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.querySelectorAll('img[data-src]').forEach(img => {
                    if (!img.src && img.dataset.src) {
                        img.src = img.dataset.src;
                        img.loading = 'lazy';
                    }
                });
                obs.unobserve(entry.target);
            });
        }, { rootMargin: '200px' });
        galleryObserver.observe(gallerySection);
    }

                if (p.startsWith('/')) return p;

                const fallback = this.pkgDefaultImage(key);
                let images = Array.isArray(raw?.images) ? [...raw.images] : [];
                let videos = Array.isArray(raw?.videos) ? [...raw.videos] : [];
                const imageUrl = (raw?.image_url || '').trim() || fallback;
                const videoUrl = (raw?.video_url || '').trim();
                if (!images.length && imageUrl) images = [imageUrl];
                if (imageUrl && !images.includes(imageUrl)) images.unshift(imageUrl);
                if (!images.length && fallback) images = [fallback];
                if (videoUrl && !videos.includes(videoUrl)) videos.push(videoUrl);
                videos = videos.filter(Boolean);
                return { image_url: images[0] || imageUrl, video_url: videoUrl, images, videos };

                const p = this.packagesData[key];
                if (!p) return [this.pkgDefaultImage(key)];
                return (p.images && p.images.length) ? p.images : [p.image_url || this.pkgDefaultImage(key)];

                const slides = [];
                const seen = new Set();
                const add = (type, url) => {
                    const u = this.mediaUrl(url);
                    if (!u || seen.has(u)) return;
                    seen.add(u);
                    slides.push({ type, url: u });
                };
                (p.images || []).forEach(url => add('image', url));
                const videoList = [...(p.videos || [])];
                if (p.video_url) videoList.push(p.video_url);
                videoList.forEach(url => add('video', url));
                if (!slides.length) {
                    add('image', p.image_url || this.pkgDefaultImage(key));
                }
                return slides;
            },
            getModalSlideLabel(key) {
                const total = this.getModalSlides(key).length;

                const typeLabel = slide.type === 'video' ? 'Video' : 'Rasm';

                const n = this.getModalSlides(key).length;
                if (n <= 1) return;
                this.pauseModalVideos();
                this.modalSlide = (this.modalSlide + 1) % n;
            },
            modalSlidePrev(key) {
                const n = this.getModalSlides(key).length;
                if (n <= 1) return;
                this.pauseModalVideos();
                this.modalSlide = (this.modalSlide - 1 + n) % n;
            },
            pkgTouchStart(e) {
                const t = e.changedTouches ? e.changedTouches[0] : e;
                this.pkgTouchStartX = t.clientX;
            },
            pkgTouchEnd(e, key, isModal) {
                const t = e.changedTouches ? e.changedTouches[0] : e;
                const dx = t.clientX - this.pkgTouchStartX;
                if (dx < -40) {
                    if (isModal) this.modalSlideNext(key);
                    else this.pkgSlideNext(key);
                } else if (dx > 40) {
                    if (isModal) this.modalSlidePrev(key);
                    else this.pkgSlidePrev(key);
                }
            },
            apiBase() {
                const local = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
                return local ? 'http://localhost:3000' : '';
            },
            async loadRemoteData() {
                const base = this.apiBase();
                const [packagesResult, mediaResult, settingsResult] = await Promise.allSettled([
                    fetch(`${base}/api/packages`),
                    fetch(`${base}/api/packages/media`),
                    fetch(`${base}/api/settings`)
                ]);

                if (packagesResult.status === 'fulfilled' && packagesResult.value.ok) {
                    try {
                        const packages = await packagesResult.value.json();
                        packages.forEach(pkg => {
                            const key = pkg.keyName || pkg.key_name;
                            if (!key || !this.packagesData[key]) return;
                            this.packagesData[key] = {
                                ...this.packagesData[key],
                                price: pkg.price,
                                display_name: pkg.displayName || pkg.display_name,
                                description: pkg.description
                            };
                        });
                    } catch (e) { console.warn('Packages parse error', e); }
                }

                if (mediaResult.status === 'fulfilled' && mediaResult.value.ok) {
                    try {
                        const mediaData = await mediaResult.value.json();
                        Object.keys(mediaData).forEach(key => {
                            const normalized = this.normalizePackageMedia(key, mediaData[key]);
                            if (this.packagesData[key]) {
                                this.packagesData[key] = { ...this.packagesData[key], ...normalized };
                            } else {
                                this.packagesData[key] = normalized;
                            }
                        });
                    } catch (e) { console.warn('Media parse error', e); }
                }

                if (settingsResult.status === 'fulfilled' && settingsResult.value.ok) {
                    try {
                        const settingsData = await settingsResult.value.json();
                        if (settingsData.hero_subtitle) this.translations.uz.hero_subtitle = settingsData.hero_subtitle;
                        if (settingsData.hero_title) this.translations.uz.hero_title = settingsData.hero_title;
                        if (settingsData.hero_desc) this.translations.uz.hero_desc = settingsData.hero_desc;
                        if (settingsData.offer_title) this.translations.uz.offer_title = settingsData.offer_title;
                        if (settingsData.offer_desc) this.translations.uz.offer_desc = settingsData.offer_desc;
                        const pixelId = (settingsData.meta_pixel_id || window.META_PIXEL_ID || '').trim();
                        if (pixelId) initMetaPixel(pixelId);
                    } catch (e) { console.warn('Settings parse error', e); }
                } else {
                    const pixelId = (window.META_PIXEL_ID || '').trim();
                    if (pixelId) initMetaPixel(pixelId);
                }
            },
            init() {
                document.documentElement.lang = this.currentLang;
                const runRemote = () => this.loadRemoteData();
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(runRemote, { timeout: 2500 });
                } else {
                    setTimeout(runRemote, 150);
                }

                this.$watch('activeModal', value => {
                    if (['standard', 'comfort', 'lux', 'lux_jumeirah'].includes(value)) {
                        this.modalSlide = 0;
                    }
                    if (!value) {
                        this.pauseModalVideos();
                        document.querySelectorAll('video').forEach(v => {
                            v.pause();
                            v.currentTime = 0;
                        });
                    } else if (value === 'booking') {
                        trackMetaEvent('InitiateCheckout', {
                            content_name: this.selectedPackage,
                            value: this.getBookingTotal(),
                            currency: 'USD'
                        });
                    }
                });
            },
            openLightbox(imgs, index) {
                this.lightboxImages = imgs;
                this.lightboxIndex = index;
            },
            async submitBooking() {
                if (document.getElementById('hp_field').value !== "") return;

                const cleanName = this.bookingName.trim().replace(/[<>]/g, "");
                let cleanPhone = this.bookingPhone.trim().replace(/[^+0-9]/g, "");

                // Validatsiya
                if (cleanName.length < 3) {
                    this.showToast("Iltimos, ismingizni kiriting.");
                    return;
                }
                if (!cleanPhone.startsWith('+')) cleanPhone = '+' + cleanPhone;
                const phoneRegex = /^\+998[0-9]{9}$/;
                if (!phoneRegex.test(cleanPhone.replace(/\s/g, ''))) {
                    this.showToast("Telefon raqamini to'g'ri kiriting: +998XXXXXXXXX");
                    return;
                }

                if(!this.isSubmitting) {
                    this.isSubmitting = true;
                    try {
                        // Backend API orqali xavfsiz yuborish
                        // Agar lokal ishlayotgan bo'lsa (file:// yoki localhost), u holda http://localhost:3000 ga yuboradi.
                        // Agar serverda bo'lsa relative '/api/leads' dan foydalanadi.
                        const apiHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
                            ? 'http://localhost:3000/api/leads'
                            : '/api/leads';

                        const response = await fetch(apiHost, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: cleanName,
                                phone: cleanPhone,
                                package: this.selectedPackage,
                                persons: this.calcPersons,
                                room: this.roomBasedPackages.includes(this.selectedPackage) ? this.bookingRoom : "",
                                operator: this.bookingOperator,
                                paymentMethod: this.bookingPayment
                            })
                        });

                        const result = await response.json();

                        if (response.ok && result.success) {
                            trackMetaEvent('Lead', {
                                content_name: this.selectedPackage,
                                value: this.getBookingTotal(),
                                currency: 'USD'
                            });
                            this.showSuccess = true;
                            setTimeout(() => {
                                this.activeModal = null;
                                this.showSuccess = false;
                                this.bookingName = '';
                                this.bookingPhone = '';
                                this.calcPersons = 1;
                                this.bookingOperator = 'Erkak';
                                this.bookingPayment = 'Naqd pul';
                            }, 3000);
                        } else {
                            throw new Error(result.error || "Murojaat yuborishda xatolik.");
                        }
                    } catch (err) {
                        console.error("Booking error:", err);
                        this.showToast("Xatolik yuz berdi. Qayta urinib ko'ring yoki qo'ng'iroq qiling.");
                    } finally {
                        this.isSubmitting = false;
                    }
                }
            }
        };
        if (window.SITE_I18N) {
            ['uz', 'ru', 'en'].forEach((lang) => Object.assign(app.translations[lang], window.SITE_I18N[lang] || {}));
        }
        return app;
    }
</script>
